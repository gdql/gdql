# Build and publish a GitHub Release when a tag v* is pushed.
# Creates binaries for linux/amd64, darwin/amd64, darwin/arm64, windows/amd64.
#
# Stable releases: tags like v1.0.0 (no hyphen suffix)
# Pre-releases:    tags like v1.0.0-nightly.20260410 or v1.0.0-rc.1
#
# Only stable releases are marked as "latest" in GitHub Releases.
# The docs "Get the CLI" link points to /releases/latest (stable only).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o gdql${{ matrix.suffix }} ./cmd/gdql
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdql-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gdql${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/gdql-linux-amd64/gdql release/gdql-linux-amd64
          cp artifacts/gdql-darwin-amd64/gdql release/gdql-darwin-amd64
          cp artifacts/gdql-darwin-arm64/gdql release/gdql-darwin-arm64
          cp artifacts/gdql-windows-amd64/gdql.exe release/gdql-windows-amd64.exe
          ls -la release/
      - name: Determine if prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.prerelease.outputs.make_latest }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger downstream consumer syncs
        # Fans out to every repo that tracks gdql releases: the sandbox
        # (WASM-backed playground) and the two deaddaily properties that
        # bake gdql artifacts into their static bundles. Each consumer's
        # gdql-sync workflow listens for this dispatch.
        #
        # Uses two fine-grained tokens so each PAT is scoped to exactly
        # one owner's repos:
        #   GDQL_DISPATCH_TOKEN       -> gdql/sandbox
        #   DOWNSTREAM_DISPATCH_TOKEN -> samburba/deaddaily-timeline + -listen
        env:
          GDQL_TOKEN: ${{ secrets.GDQL_DISPATCH_TOKEN }}
          DOWNSTREAM_TOKEN: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
        run: |
          set -u
          dispatch() {
            local repo="$1" token="$2"
            echo "→ dispatching to $repo"
            curl -s -X POST \
              -H "Authorization: token ${token}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${repo}/dispatches" \
              -d "{\"event_type\":\"gdql-release\",\"client_payload\":{\"tag\":\"${GITHUB_REF_NAME}\"}}"
          }
          dispatch gdql/sandbox                  "$GDQL_TOKEN"
          dispatch samburba/deaddaily-timeline   "$DOWNSTREAM_TOKEN"
          dispatch samburba/deaddaily-listen     "$DOWNSTREAM_TOKEN"
        continue-on-error: true
